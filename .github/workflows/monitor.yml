name: Hourly Failure Alert

# Durable, session-independent monitor for the "Hourly Post Generation" workflow.
# When an hourly run finishes with a failure, this opens (or comments on) a single
# tracking issue so repeated failures dedupe into one thread instead of spamming —
# GitHub then emails the issue's subscribers. When a later run succeeds, the open
# tracking issue is closed with a recovery note. Successful runs with no open issue
# do nothing. workflow_run workflows only dispatch from the default branch, so this
# must live on main to fire.
on:
  workflow_run:
    workflows: ['Hourly Post Generation']
    types: [completed]

permissions:
  contents: read
  issues: write

# One alert action at a time, so two near-simultaneous completions can't both
# create a duplicate tracking issue.
concurrency:
  group: hourly-failure-alert

jobs:
  alert:
    # Real failures only — ignore 'cancelled' (concurrency-superseded ticks).
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out' }}
    runs-on: ubuntu-latest
    steps:
      - name: Open or update the tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const LABEL = 'hourly-failure';
            const TITLE = 'Hourly Post Generation is failing';
            const body = [
              `The **Hourly Post Generation** workflow finished with \`${run.conclusion}\`.`,
              '',
              `- Run: ${run.html_url}`,
              `- Commit: \`${(run.head_sha || '').slice(0, 7)}\` on \`${run.head_branch}\``,
              `- Finished: ${run.updated_at}`,
              '',
              '_Posted automatically. This issue closes itself when an hourly run next succeeds, and reopens on the next failure._',
            ].join('\n');

            // Make sure the dedupe label exists.
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: LABEL });
            } catch {
              await github.rest.issues.createLabel({
                ...context.repo, name: LABEL, color: 'B60205',
                description: 'Automated: an hourly generation run failed',
              });
            }

            // Reuse an open tracking issue if one exists; otherwise open one.
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: LABEL, per_page: 1,
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: open.data[0].number, body,
              });
              core.info(`Commented on existing issue #${open.data[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                ...context.repo, title: TITLE, labels: [LABEL], body,
              });
              core.info(`Opened issue #${created.data.number}`);
            }

  resolve:
    # On a green run, close any open tracking issue so it reads as a live signal.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Close the tracking issue if the job recovered
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const LABEL = 'hourly-failure';
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: LABEL, per_page: 100,
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: issue.number,
                body: `Recovered — an hourly run succeeded (${run.html_url}). Closing.`,
              });
              await github.rest.issues.update({
                ...context.repo, issue_number: issue.number, state: 'closed',
              });
              core.info(`Closed issue #${issue.number}`);
            }
